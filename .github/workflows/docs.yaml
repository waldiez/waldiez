---
name: Docs 📖
# yamllint disable rule:truthy
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
  repository_dispatch:
    types: [wactorz-docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment,
# skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          submodules: "recursive"

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12

      - name: Setup bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install ts dependencies
        run: bun install

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/main.txt -r requirements/dev.txt -r requirements/test.txt -r requirements/docs.txt

      - name: Build documentation
        run: |
          bun run docs
          cp CONTRIBUTING.md docs/contribute/index.md
          mkdocs build --config-file mkdocs.yml --site-dir site/canvas

      - name: Fetch wactorz docs
        run: |
          mkdir -p site/wactorz
          curl -L https://github.com/waldiez/wactorz/archive/refs/heads/gh-pages.tar.gz \
            | tar -xz --strip-components=1 -C site/wactorz

      - name: Add root files
        run: |
          echo "docs.waldiez.io" > site/CNAME
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=/canvas/">
          <link rel="canonical" href="/canvas/" />
          </head><body>
          <p>Redirecting to <a href="/canvas/">docs</a>...</p>
          </body></html>
          EOF


      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: "./site"

  deploy-docs:
    name: Deploy Docs to GitHub Pages
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
